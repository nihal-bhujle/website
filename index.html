<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nihal — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #0d0f12;
      --color-text: #e8e6e3;
      --color-muted: #9a9590;
      --color-accent: #c4b8a8;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.3;
      margin-bottom: 2.5rem;
    }

    .headline em {
      font-style: italic;
      font-weight: 400;
      color: var(--color-accent);
    }

    .photo-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1rem 0 2.5rem;
      max-width: 480px;
    }

    .photo-container img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
    }

    .contact {
      font-size: 0.95rem;
      color: var(--color-muted);
      letter-spacing: 0.03em;
    }

    .contact a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact a:hover {
      color: var(--color-text);
    }

    @media (min-width: 768px) {
      body {
        padding: 3rem 2rem;
      }

      .headline {
        margin-bottom: 3rem;
      }

      .photo-container {
        max-width: 420px;
        margin: 1.5rem 0 3rem;
      }
    }
  </style>
</head>
<body>
  <h1 class="headline">Coming Soon.<br><em>Nihal, Reimagined.</em></h1>
  <div class="photo-container">
    <img src="assets/nihal-portrait.png" alt="Nihal" width="480" height="640">
  </div>
  <p class="contact">
    <a href="mailto:nbhujle@gmail.com">nbhujle[at]gmail</a>
  </p>
</body>
</html>
